<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Specialist Registration</title>
<link rel="stylesheet" href="../CSS/register.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Specialist Registration</h1>
        <!-- Progress Bar -->
        <div class="progress">
            <div class="active"></div>
            <div class="active"></div>
        </div>
        <form action="verification-pending.html">
            <h2 class="section-title">Professional Credentials</h2>
            <div class="input-group full">
                <label>Hospital / Clinic</label>
                <input type="text" required>
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Specialization</label>
                    <input type="text" required>
                </div>
                <div class="input-group">
                    <label>Experience Year</label>
                    <input type="number" required>
                </div>
            </div>
            <!-- Upload -->
            <div class="upload-box">
                <p>⬆</p>
                <span>Click to upload or drag to drop</span>
                <input type="file" required>
            </div>
            <!-- Buttons -->
            <div class="button-group">
                <button type="button" class="btn-back"><a href="register.html">Back</a></button>

                <button type="submit" class="btn-submit">
                    Submit Application
                </button>
            </div>
            <div class="divider">
                <span></span>
                <span></span>
            </div>
            <p class="login-text">
                Already Verified? <a href="#">Login</a>
            </p>
        </form>
    </div>
</div>
</body>
</html>
