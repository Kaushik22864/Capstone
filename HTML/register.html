<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Specialist Registration</title>
<link rel="stylesheet" href="../CSS/register.css">
</head>

<body>

<div class="container">

    <div class="card">
        <h1>Specialist Registration</h1>
        <!-- Progress Bar -->
        <div class="progress">
            <div class="active"></div>
            <div></div>
        </div>
        <form>
            <div class="row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Last name</label>
                    <input type="text">
                </div>
            </div>
            <div class="input-group full">
                <label>Email Address</label>
                <input type="email">
            </div>
            <div class="input-group full">
                <label>Password</label>
                <input type="password">
            </div>
            <button class="btn"><a href="register-step2.html">Next Step</button></a>
            <div class="divider">
                <span></span>
                <span></span>
            </div>
            <p class="login-text">
                Already Verified? <a href="login.html">Login</a>
            </p>
        </form>
    </div>
</div>
</body>
</html>
