<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

<div class="container">
    <div class="login-card">
        <div class="left">
            <img src="../Assets/Pharmacist--Streamline-Milano.png" alt="Illustration">
        </div>
        <div class="right">
            <h1>Welcome Back</h1>
            <form>
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
                <div class="options">
                    <label class="remember">
                        <input type="checkbox">
                        Remember this device
                    </label>
                    <a href="#">Forget Password?</a>
                </div>
                <button type="submit">Login</button>
                <div class="divider">
                    <span></span>
                    <span></span>
                </div>
                <p class="apply">
                    New specialist ? <a href="register.html">Apply for Access</a>
                </p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
